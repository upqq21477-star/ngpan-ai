<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Legion3K - 歷史地理系統</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #1a1208;
            --border-color: rgba(200, 168, 75, 0.6);
            --hover-color: rgba(200, 168, 75, 0.9);
            --text-color: #c8a84b;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-color); overflow: hidden; }
        #map { width: 100%; height: 100vh; background: var(--bg-color); }
        
        /* 歷史感 Tooltip 樣式 */
        .city-tooltip {
            background: rgba(26, 18, 8, 0.9) !important;
            border: 1px solid var(--text-color) !important;
            color: var(--text-color) !important;
            font-family: "Noto Serif TC", serif;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    /**
     * 【總編輯核心配置區】
     * 請根據你的 render_map.py 裡的 BBOX 數值填入以下邊界線
     * 這樣能確保 776.png 與 GeoJSON 完全對齊不變形
     */
    const MAP_BOUNDS = [[18.0, 73.0], [53.5, 135.0]]; // [南緯, 西經], [北緯, 東經] (範例值，請依腳本微調)
    const IMAGE_URL = '776.png';
    const DATA_URL = 'merged_cities.geojson';

    // 1. 初始化地圖 (使用 Web Mercator 投影以對齊你的渲染腳本)
    const map = L.map('map', {
        center: [35, 105],
        zoom: 5,
        minZoom: 4,
        maxZoom: 10,
        attributionControl: false
    });

    // 2. 疊加地形底圖 (776.png)
    // 使用 ImageOverlay 確保圖片就是地圖的全部，不使用外部 TileLayer
    const terrainLayer = L.imageOverlay(IMAGE_URL, MAP_BOUNDS).addTo(map);

    // 3. 讀取並渲染你的城市邊界數據 (merged_cities.geojson)
    fetch(DATA_URL)
        .then(response => response.json())
        .then(data => {
            L.geoJSON(data, {
                style: {
                    color: "rgba(200, 168, 75, 0.4)", // 邊界線顏色
                    weight: 1,
                    fillColor: "transparent",        // 平時不填色，保留底圖質感
                    fillOpacity: 0
                },
                onEachFeature: function (feature, layer) {
                    // 懸停交互：顯示城市名稱
                    if (feature.properties && feature.properties.name) {
                        layer.bindTooltip(feature.properties.name, {
                            sticky: true,
                            className: 'city-tooltip',
                            direction: 'top'
                        });
                    }

                    // 視覺反饋
                    layer.on('mouseover', function() {
                        this.setStyle({
                            weight: 2,
                            color: "rgba(200, 168, 75, 1)",
                            fillColor: "rgba(200, 168, 75, 0.1)",
                            fillOpacity: 1
                        });
                    });
                    layer.on('mouseout', function() {
                        this.setStyle({
                            weight: 1,
                            color: "rgba(200, 168, 75, 0.4)",
                            fillColor: "transparent",
                            fillOpacity: 0
                        });
                    });
                }
            }).addTo(map);

            // 調整視角以包含所有數據
            // map.fitBounds(MAP_BOUNDS);
        })
        .catch(err => console.error("無法讀取 GeoJSON，請確認檔案路徑或使用本地伺服器開啟:", err));

</script>
</body>
</html>
